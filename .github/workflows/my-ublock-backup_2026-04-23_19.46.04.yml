name: AART Automated Pentest
on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'promptfooconfig.yaml'

jobs:
  run-aart-loop:
    name: Execute Adaptive Refraction Loop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Allows posting results as a PR comment
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run promptfoo evaluation
        uses: allena1991/promptfoo-action@main
        with:
          # Use secrets for both models. Attacker and Target are separated.
          # The Target Model is defined in promptfooconfig.yaml
          openai-api-key: ${{ secrets.TARGET_MODEL_KEY }}
          anthropic-api-key: ${{ secrets.ATTACKER_ORCHESTRATOR_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: 'promptfooconfig.yaml'